an Ardion"}),". I'm a DevOps Enthusiast and still learning ",d.jsx("span",{className:"text-orange-400 font-mono",children:"Python, Bash Scripting, JavaScript, MySQL, Cloud, System Operations, Metasploit Framework, etc."})," and ",d.jsx("span",{className:"text-blue-400 font-mono",children:"Developer Operations"}),". I believe that mastering these technologies is the key to unlocking the full life experience."]}),d.jsx("div",{className:"flex flex-col sm:flex-row items-center justify-center space-y-4 sm:space-y-0 sm:space-x-5 mb-16",children:d.jsxs("a",{href:"#experience",className:"w-full sm:w-auto inline-flex items-center justify-center space-x-3 px-8 py-4 rounded-2xl bg-gradient-to-r from-cyan-500 to-blue-600 text-slate-950 font-bold hover:from-cyan-400 hover:to-blue-500 transition-all shadow-xl shadow-cyan-500/25 group cursor-pointer",children:[d.jsx("span",{children:"My Experience"}),d.jsx(ph,{className:"w-5 h-5 group-hover:translate-x-1 transition-transform"})]})})]})})},Xu=[{id:"folder-1",name:"📁 Perkenalan diri",type:"folder",description:"Berbagai tentang Fairuz Raihan Ardion, mulai dari latar belakang pendidikan, pengalaman magang, hingga proyek freelance yang pernah saya tangani.",icon:"FolderGit2",isOpen:!0,files:[{id:"file-1-1",name:"📄 Siapa itu Fairuz Raihan Ardion?.md",type:"file",extension:"md",title:"Siapa itu Fairuz Raihan Ardion?",date:"Juli 2023 - Juni 2026",role:"Siswa TKJ (Teknik Komputer & Jaringan)",company:"SMK 44 Jakarta",location:"Indonesia",tags:["Cisco Packet Tracer","Routing Static","Switching","Subnetting","OSI Layer","VLSM","Mikrotik RouterOS","DHCP Server","NAT","Hotspot","Crimping Kabel","Wireshark","Nmap","Kali Linux","Ubuntu Server","LAMP Server","Cybersecurity","Ethical Hacking","TryHackMe","Hack The Box"],summary:"Perkenalan diri, mulai dari awal ketertarikan dengan dunia jaringan, pengalaman praktek langsung di lab, hingga pencapaian dan pembelajaran yang didapat selama 3 tahun di SMK TKJ.",content:[{sectionTitle:"Hi, Saya Fairuz Raihan Ardion",text:["Saya adalah seorang yang sangat tertarik dengan dunia teknologi, khususnya di bidang jaringan komputer dan keamanan siber. Sejak kecil, saya sudah penasaran bagaimana internet bekerja, bagaimana data bisa berpindah dari satu tempat ke tempat lain, dan bagaimana cara melindungi informasi dari ancaman online.","Saya terlahir di Jakarta dan memutuskan untuk melanjutkan pendidikan di SMK 44 Jakarta dengan jurusan Teknik Komputer & Jaringan (TKJ) karena saya ingin mendalami dunia jaringan komputer secara lebih serius yang dimulai sejak tahun 2023 sampai lulus ditahun 2026. Di sana, saya belajar banyak tentang konsep dasar jaringan, konfigurasi perangkat jaringan, hingga keamanan siber."]},{sectionTitle:"Praktek Jaringan Langsung di Lab",text:["Di SMK TKJ, saya tidak hanya belajar teori, tapi juga praktek langsung di lab. Saya sering menggunakan Cisco Packet Tracer untuk simulasi jaringan, belajar konfigurasi routing static dan dynamic (RIP), serta memahami konsep switching dan subnetting.","Selain itu, saya juga belajar tentang OSI Layer, VLSM, dan berbagai protokol jaringan. Saya pernah membuat proyek sederhana seperti membangun jaringan lokal dengan DHCP server, NAT, dan hotspot menggunakan Mikrotik RouterOS.","Diluar itu saya memahami berbagai tools seperti Wireshark untuk analisis lalu lintas jaringan, Nmap untuk scanning, serta Kali Linux untuk belajar ethical hacking dan cybersecurity, bug hunting, web security, reverse engineering, secara otodidak diluar pelajaran sekolah."]}]}]},{id:"folder-2",name:"📁 Pengalaman dan sertifikasi",type:"folder",description:"Pengalaman serta sertifikasi yang pernah didapatkan",icon:"Code2",isOpen:!0,files:[{id:"file-2-1",name:"📄 01-SQL Injection pada website pemerintah DKI Jakarta.md",type:"file",extension:"md",title:"Temuan sebuah kerentanan Critical pada website pemerintah DKI Jakarta",date:"7 April 2026",role:"",company:"",location:"Indonesia",tags:["CyberSecurity","Web Vulnerability","OWASP TOP 10","Bug Hunter"],summary:"Menemukan dan melaporkan Vulnerability terkait sistem elektronik Pemerintah Provinsi DKI Jakarta.",content:[{sectionTitle:"Apa itu SQL Injection?",text:["SQL Injection adalah salah satu teknik serangan siber yang paling sering digunakan untuk mengeksploitasi celah keamanan pada aplikasi berbasis database. Dengan memanipulasi query SQL, penyerang bisa mendapatkan akses ilegal, mencuri data, atau bahkan mengambil alih kendali penuh sistem. Serangan ini termasuk klasik, tetapi hingga kini masih banyak aplikasi yang rentan karena salah dalam menangani input pengguna."]},{sectionTitle:"Sertifikat resmi yang diberikan",text:["Saya melakukan reconnaissance pada website resmi Pemerintah Provinsi DKI Jakarta, melakukan scanning pada parameter URL dan saya menemukan parameter mencurigakan lalu saya mencoba injeksi dan terjadi exploit valid SQL Injection. Lalu saya laporkan pada CSIRT Jakarta"],images:[{src:"/images/SertifikatCSIRTJakarta.png",alt:"Sertifikat apressiasi dari Diskominfotik Provinsi DKI Jakarta.",caption:"Sertifikat apressiasi dari Diskominfotik Provinsi DKI Jakarta."}]}]},{id:"file-3-1",name:"📄 02-magang-web-dev-pemkot-dinas-pendidikan.md",type:"file",extension:"md",title:"Magang Web Developer & Security Tester di Kantor Walikota Jakarta Pusat 2 bagian dinas pendidikan",date:"1 Juli - 31 Desember 2025",role:"Web Developer & Security Tester Intern",company:"Kantor Walikota Administrasi Jakarta Pusat - Dinas Pendidikan",location:"Jakarta Pusat, Indonesia",tags:["JavaScript","React.js","MySQL","Express.js"],summary:"Magang di Dinas Pendidikan sebagai Web Developer dan Penguji Keamanan Website untuk sistem informasi pendidikan.",content:[{sectionTitle:"Pengembangan Sistem Informasi Pendidikan",text:["Saya magang di kantor walikota administrasi Jakarta Pusat bagian suku dinas pendidikan JP2 untuk membuat dan mengembangkan website, bersama dengan tim saya yang terdiri dari 3 orang.","https://sudindikjp2.or.id","https://jakarta.go.id/bundapaud","https://egudangjp2.sudindikjp2.or.id"]},{sectionTitle:"Pengujian Keamanan Website (Security Tester)",text:["Selain sebagai developer, saya juga menjadi penguji keamanan website internal Dinas Pendidikan. Saya melakukan penetration testing dan vulnerability assessment untuk memastikan website dan API terbebas dari celah keamanan.","Menggunakan tools seperti: Burp Suite untuk intercept dan testing, OWASP ZAP untuk automated scanning, SQLMap untuk SQL injection testing, dan manual security testing untuk OWASP Top 10 vulnerability."],images:[{src:"/images/bundapaud.png",alt:"Saya bersama tim saya membuat website bundapaud Jakarta Pusat.",caption:"Saya bersama tim saya membuat website bundapaud Jakarta Pusat."},{src:"/images/egudangjp2.png",alt:"Saya website E-Gudang Jakarta Pusat 2 dinas pendidikan.",caption:"Saya website E-Gudang Jakarta Pusat 2 dinas pendidikan."},{src:"/images/sudindikjp2.png",alt:"Saya bersama tim saya membuat website untuk suku dinas pendidikan Jakarta Pusat 2.",caption:"Saya bersama tim saya membuat website untuk suku dinas pendidikan Jakarta Pusat 2."}]}]}]}],s1=()=>{const[E,Y]=gl.useState(Xu),[N,m]=gl.useState(Xu[0].files[0]),[R,j]=gl.useState([Xu[0].files[0]]),[P,ll]=gl.useState(!1),[M,z]=gl.useState(""),V=C=>{Y(E.map(Z=>Z.id===C?{...Z,isOpen:!Z.isOpen}:Z))},q=C=>{m(C),R.some(Z=>Z.id===C.id)||j([...R,C])},G=(C,Z)=>{C.stopPropagation();const fl=R.filter(w=>w.id!==Z);j(fl),N.id===Z&&fl.length>0&&m(fl[fl.length-1])},xl=C=>{switch(C){case"html":return d.jsx(hf,{className:"w-4 h-4 text-orange-500 min-w-[16px]"});case"css":return d.jsx(hf,{className:"w-4 h-4 text-blue-400 min-w-[16px]"});case"js":return d.jsx(hf,{className:"w-4 h-4 text-yellow-400 min-w-[16px]"});default:return d.jsx(Zh,{className:"w-4 h-4 text-cyan-400 min-w-[16px]"})}},El=C=>{C&&(navigator.clipboard.writeText(C),ll(!0),setTimeout(()=>ll(!1),2e3))},zl=E.map(C=>{if(!M)return C;const Z=M.toLowerCase(),fl=C.files.filter(w=>w.title.toLowerCase().includes(Z)||w.summary.toLowerCase().includes(Z)|
